name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 bundles an older npm
      - run: npm install -g npm@latest

      - run: npm test

      - name: Check tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      # Auth via npm Trusted Publishing (GitHub OIDC) — no token secret needed
      - run: npm publish --provenance --access public
